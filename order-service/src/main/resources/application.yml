server:
  port: 8081
  # Tomcat tuning for ~10k req/s ingress. Each createOrder is a short local TX, so a
  # few hundred threads absorb bursts; scale horizontally beyond a single node.
  tomcat:
    threads:
      max: 400
      min-spare: 50
    accept-count: 200

spring:
  application:
    name: order-service

  datasource:
    # Kết nối tới Postgres trên localhost khi chạy ứng dụng từ máy host
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:${POSTGRES_PORT:5432}/order_db
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 50
      minimum-idle: 10
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate.dialect: org.hibernate.dialect.PostgreSQLDialect
      hibernate.jdbc.batch_size: 50
      hibernate.order_inserts: true
      hibernate.order_updates: true
      # Tối ưu hóa việc sinh ID tự động cho PostgreSQL (sử dụng Sequence hiệu quả hơn)
      hibernate.id.new_generator_mappings: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      lettuce:
        pool:
          max-active: 64
          max-idle: 32
          min-idle: 8

  kafka:
    # 5-broker cluster, reachable from the host on these SSL ports.
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092,localhost:9192,localhost:9292,localhost:9392,localhost:9492}
    # SSL/mTLS to the brokers (client-auth required). Override file paths /
    # passwords via env in production; keep the key material in a secret manager.
    security:
      protocol: ${KAFKA_SECURITY_PROTOCOL:SSL}
    ssl:
      trust-store-location: ${KAFKA_SSL_TRUSTSTORE_LOCATION:file:certs/kafka.client.truststore.jks}
      trust-store-password: ${KAFKA_SSL_TRUSTSTORE_PASSWORD:changeit}
      key-store-location: ${KAFKA_SSL_KEYSTORE_LOCATION:file:certs/kafka.client.keystore.jks}
      key-store-password: ${KAFKA_SSL_KEYSTORE_PASSWORD:changeit}
      key-password: ${KAFKA_SSL_KEY_PASSWORD:changeit}
    properties:
      # Verify the broker hostname against the cert SAN (set empty to disable).
      ssl.endpoint.identification.algorithm: ${KAFKA_SSL_ENDPOINT_ALGO:https}
    # Producer tuning (batching knobs). Durability/ordering knobs — idempotence,
    # max.in.flight=5, buffer.memory — are set in KafkaConfig. With idempotence ON,
    # ordering is preserved even with several in-flight requests, so we do NOT cap
    # to 1 (that would throttle throughput).
    producer:
      acks: all                  # no data loss on the broker
      batch-size: 65536          # 64KB batches → fewer, larger sends at 10k req/s
      compression-type: lz4      # cheap CPU, less network
      properties:
        linger.ms: 10            # wait up to 10ms to fill a batch
    consumer:
      group-id: order-service
      auto-offset-reset: earliest
      max-poll-records: 500      # fetch up to 500/poll; processed ONE at a time
      enable-auto-commit: false  # container commits offsets (AckMode.BATCH, see KafkaConfig)
      properties:
        max.poll.interval.ms: 300000
        fetch.min.bytes: 1       # low latency; raise to batch fetches under heavy load
    # NOTE: single-record processing + AckMode.BATCH + concurrency are configured
    # in KafkaConfig.kafkaListenerContainerFactory (not here).

app:
  topics:
    partitions: 5
    replicas: 3          # RF=3 across the 5-broker cluster (min.insync.replicas=2)
  outbox:
    poll-interval-ms: 50     # drain the outbox 20×/s
    batch-size: 500          # 500 × 20/s ⇒ ~10k events/s of relay headroom per instance

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  metrics:
    distribution:
      percentiles-histogram:
        http.server.requests: true
  tracing:
    sampling:
      probability: 1.0   # sample everything in dev; lower (e.g. 0.1) under real load
  # OpenTelemetry: export traces + logs over OTLP to the collector, which fans
  # out to Tempo (traces) and Loki (logs). Metrics stay pull-based via Prometheus.
  otlp:
    tracing:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318}/v1/traces
    logging:
      endpoint: ${OTLP_ENDPOINT:http://localhost:4318}/v1/logs
      export:
        enabled: true
  opentelemetry:
    resource-attributes:
      service.name: ${spring.application.name}
      deployment.environment: local

logging:
  pattern:
    # Correlate logs with traces: traceId/spanId are injected by Micrometer.
    level: "%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]"
