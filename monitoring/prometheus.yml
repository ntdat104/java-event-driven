global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Apps run on the host; scrape their Micrometer/Prometheus endpoint.
  # Exemplars (traceID attached to histogram buckets) are exposed when the
  # endpoint is served as OpenMetrics — Spring Boot does this automatically
  # once tracing is on, enabling metric -> trace jumps in Grafana.
  - job_name: order-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8081"]
        labels:
          application: order-service

  - job_name: inventory-service
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8082"]
        labels:
          application: inventory-service

  # The collector's own health/throughput.
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8888"]
