apiVersion: 1

datasources:
  # ---- Metrics -------------------------------------------------------------
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      httpMethod: POST
      # Click an exemplar dot on a latency panel -> open the trace in Tempo.
      exemplarTraceIdDestinations:
        - name: trace_id
          datasourceUid: tempo
          urlDisplayLabel: "View trace"

  # ---- Traces --------------------------------------------------------------
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      # Trace span -> correlated logs in Loki, scoped to the same trace/service.
      tracesToLogsV2:
        datasourceUid: loki
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: true
        filterBySpanID: false
        tags:
          - key: service.name
            value: service_name
      # Trace -> RED metrics (rate/error/duration) in Prometheus.
      tracesToMetrics:
        datasourceUid: prometheus
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
      # Service graph + node graph come from Tempo's metrics_generator output.
      serviceMap:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true
      tracesToProfiles:
        customQuery: false

  # ---- Logs ----------------------------------------------------------------
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      # A log line carries traceID as structured metadata -> link to the trace.
      derivedFields:
        - name: trace_id
          matcherType: label
          matcherRegex: trace_id
          url: "$${__value.raw}"
          datasourceUid: tempo
          urlDisplayLabel: "View trace"
