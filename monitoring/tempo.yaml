# Tempo — single-binary trace store for local dev.
server:
  http_listen_port: 3200

# Receive traces from the OTel Collector (OTLP).
distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 24h   # dev retention; bump for real use

# Local filesystem storage — fine for dev, not for prod.
storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

# Derive RED metrics + a service graph from spans and remote-write them to
# Prometheus. This is what powers Grafana's "Service Graph" / span-rate panels
# without the apps emitting any extra metrics.
metrics_generator:
  registry:
    external_labels:
      source: tempo
  storage:
    path: /var/tempo/generator/wal
    remote_write:
      - url: http://prometheus:9090/api/v1/write
        send_exemplars: true
  traces_storage:
    path: /var/tempo/generator/traces

overrides:
  defaults:
    metrics_generator:
      processors: [service-graphs, span-metrics, local-blocks]
