# Production-like infra for benchmarking. The two Spring services run on the HOST
# (mvn spring-boot:run) and connect to the Kafka cluster over SSL/mTLS via
# localhost:{9092,9192,9292,9392,9492}.
#
#   Kafka : 5-broker KRaft cluster, SSL/mTLS on every data listener
#           (client-auth required), RF=3 / min.insync.replicas=2, 5 partitions.
#   Certs : run scripts/generate-kafka-certs.sh first → ./certs/*
#
# Observability = Grafana LGTM + OpenTelemetry:
#   apps --OTLP--> otel-collector --> Tempo (traces) + Loki (logs)
#   apps --/actuator/prometheus--<scrape> Prometheus (metrics, with exemplars)

# ---- Shared Kafka broker config (anchors) ----------------------------------
# Every broker is broker+controller (KRaft combined). Same cluster id + quorum.
# Data listeners (HOST for the apps, DOCKER for inter-broker) are SSL; the
# internal CONTROLLER listener stays PLAINTEXT on the trusted compose network.
x-kafka-env: &kafka-env
  KAFKA_PROCESS_ROLES: broker,controller
  KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka1:9093,2@kafka2:9093,3@kafka3:9093,4@kafka4:9093,5@kafka5:9093
  KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
  KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
  KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,HOST:SSL,DOCKER:SSL
  CLUSTER_ID: "4L6g3nShT-eMCtK--X86sw"
  # Durability: 3 replicas, tolerate one broker down while still accepting acks=all.
  KAFKA_NUM_PARTITIONS: "5"
  KAFKA_DEFAULT_REPLICATION_FACTOR: "3"
  KAFKA_MIN_INSYNC_REPLICAS: "2"
  KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "3"
  KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "3"
  KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "2"
  KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
  KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  # SSL: one shared keystore (SAN covers kafka1..5 + localhost) + a truststore
  # that trusts the CA, so brokers verify each other and the clients (mTLS).
  KAFKA_SSL_KEYSTORE_LOCATION: /etc/kafka/secrets/kafka.server.keystore.jks
  KAFKA_SSL_KEYSTORE_PASSWORD: changeit
  KAFKA_SSL_KEY_PASSWORD: changeit
  KAFKA_SSL_TRUSTSTORE_LOCATION: /etc/kafka/secrets/kafka.server.truststore.jks
  KAFKA_SSL_TRUSTSTORE_PASSWORD: changeit
  KAFKA_SSL_CLIENT_AUTH: required

x-kafka-broker: &kafka-broker
  image: apache/kafka:3.8.1
  restart: unless-stopped
  volumes:
    - ./certs:/etc/kafka/secrets:ro
  healthcheck:
    # CLI tools need certs now that every data listener is SSL.
    test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server $$(hostname):19092 --command-config /etc/kafka/secrets/client-ssl.properties --list || exit 1"]
    interval: 10s
    timeout: 10s
    retries: 15
    start_period: 30s

services:
  postgres:
    image: postgres:16-alpine
    container_name: edd-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: order_db
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d order_db" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---- Kafka: 5-broker KRaft cluster over SSL/mTLS -------------------------
  kafka1:
    <<: *kafka-broker
    container_name: edd-kafka1
    hostname: kafka1
    ports:
      - "9092:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 1
      KAFKA_LISTENERS: HOST://:9092,DOCKER://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka1:19092
    volumes:
      - ./certs:/etc/kafka/secrets:ro
      - kafka1-data:/var/lib/kafka/data

  kafka2:
    <<: *kafka-broker
    container_name: edd-kafka2
    hostname: kafka2
    ports:
      - "9192:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 2
      KAFKA_LISTENERS: HOST://:9092,DOCKER://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9192,DOCKER://kafka2:19092
    volumes:
      - ./certs:/etc/kafka/secrets:ro
      - kafka2-data:/var/lib/kafka/data

  kafka3:
    <<: *kafka-broker
    container_name: edd-kafka3
    hostname: kafka3
    ports:
      - "9292:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 3
      KAFKA_LISTENERS: HOST://:9092,DOCKER://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9292,DOCKER://kafka3:19092
    volumes:
      - ./certs:/etc/kafka/secrets:ro
      - kafka3-data:/var/lib/kafka/data

  kafka4:
    <<: *kafka-broker
    container_name: edd-kafka4
    hostname: kafka4
    ports:
      - "9392:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 4
      KAFKA_LISTENERS: HOST://:9092,DOCKER://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9392,DOCKER://kafka4:19092
    volumes:
      - ./certs:/etc/kafka/secrets:ro
      - kafka4-data:/var/lib/kafka/data

  kafka5:
    <<: *kafka-broker
    container_name: edd-kafka5
    hostname: kafka5
    ports:
      - "9492:9092"
    environment:
      <<: *kafka-env
      KAFKA_NODE_ID: 5
      KAFKA_LISTENERS: HOST://:9092,DOCKER://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9492,DOCKER://kafka5:19092
    volumes:
      - ./certs:/etc/kafka/secrets:ro
      - kafka5-data:/var/lib/kafka/data

  redis:
    image: redis:7.4-alpine
    container_name: edd-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"

  # ---- Observability: OpenTelemetry + LGTM ---------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: edd-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./monitoring/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (apps use this)
    depends_on:
      - tempo
      - loki

  tempo:
    image: grafana/tempo:2.7.0
    container_name: edd-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./monitoring/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP (Grafana queries this)

  loki:
    image: grafana/loki:3.3.2
    container_name: edd-loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: edd-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--enable-feature=exemplar-storage"
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: edd-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_FEATURE_TOGGLES_ENABLE: traceToMetrics,traceqlEditor
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo
      - loki

  # Kafka UI for topics, consumer lag, and DLQ contents. Talks to the cluster
  # over SSL/mTLS via the internal DOCKER listeners.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: edd-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:19092,kafka2:19092,kafka3:19092,kafka4:19092,kafka5:19092
      KAFKA_CLUSTERS_0_PROPERTIES_SECURITY_PROTOCOL: SSL
      KAFKA_CLUSTERS_0_SSL_TRUSTSTORELOCATION: /certs/kafka.client.truststore.jks
      KAFKA_CLUSTERS_0_SSL_TRUSTSTOREPASSWORD: changeit
      KAFKA_CLUSTERS_0_SSL_KEYSTORELOCATION: /certs/kafka.client.keystore.jks
      KAFKA_CLUSTERS_0_SSL_KEYSTOREPASSWORD: changeit
      DYNAMIC_CONFIG_ENABLED: "true"
    volumes:
      - ./certs:/certs:ro
    depends_on:
      kafka1:
        condition: service_healthy

volumes:
  kafka1-data:
  kafka2-data:
  kafka3-data:
  kafka4-data:
  kafka5-data:
  tempo-data:
  loki-data:
