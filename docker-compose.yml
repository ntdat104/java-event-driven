# Infra for local dev. Services themselves run on the host (mvn spring-boot:run)
# and connect to these on localhost.
#
# Observability = Grafana LGTM + OpenTelemetry:
#   apps --OTLP--> otel-collector --> Tempo (traces) + Loki (logs)
#   apps --/actuator/prometheus--<scrape> Prometheus (metrics, with exemplars)
#   Grafana reads Prometheus + Tempo + Loki, correlated metric -> trace -> log.
services:
  postgres:
    image: postgres:16-alpine
    container_name: edd-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: order_db
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d order_db" ]
      interval: 5s
      timeout: 5s
      retries: 5
  kafka:
    image: apache/kafka:3.8.1
    container_name: edd-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      # HOST listener for clients on the host (services via localhost:9092),
      # DOCKER listener for containers on the compose network (kafka-ui).
      KAFKA_LISTENERS: HOST://:9092,DOCKER://:19092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: HOST://localhost:9092,DOCKER://kafka:19092
      KAFKA_INTER_BROKER_LISTENER_NAME: DOCKER
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,HOST:PLAINTEXT,DOCKER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 12
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: edd-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "512mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"

  # ---- Observability: OpenTelemetry + LGTM ---------------------------------

  # Single ingestion point for app telemetry. Apps push OTLP here (host -> :4318);
  # the collector fans out: traces -> Tempo, logs -> Loki. Vendor-agnostic seam:
  # swap a backend without touching the apps.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.116.1
    container_name: edd-otel-collector
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./monitoring/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP (apps use this)
    depends_on:
      - tempo
      - loki

  # Traces. Accepts OTLP from the collector; generates span metrics + service
  # graph and remote-writes them to Prometheus (RED metrics for free).
  tempo:
    image: grafana/tempo:2.7.0
    container_name: edd-tempo
    command: ["-config.file=/etc/tempo.yaml"]
    volumes:
      - ./monitoring/tempo.yaml:/etc/tempo.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP (Grafana queries this)

  # Logs. Loki 3.x ingests OTLP natively (/otlp/v1/logs).
  loki:
    image: grafana/loki:3.3.2
    container_name: edd-loki
    command: ["-config.file=/etc/loki/loki-config.yaml"]
    volumes:
      - ./monitoring/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"

  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: edd-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      # Exemplars: lets a metric point carry a traceID so you can jump
      # Prometheus panel -> the exact trace in Tempo.
      - "--enable-feature=exemplar-storage"
      # Lets Tempo's metrics_generator push span metrics in via remote write.
      - "--web.enable-remote-write-receiver"
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.4.0
    container_name: edd-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      # Newer correlation features (trace -> logs/metrics) ship behind flags.
      GF_FEATURE_TOGGLES_ENABLE: traceToMetrics,traceqlEditor
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
      - tempo
      - loki

  # Optional: Kafka UI for inspecting topics, consumer lag, and DLQ contents.
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: edd-kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:19092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      kafka:
        condition: service_healthy

volumes:
  tempo-data:
  loki-data:
