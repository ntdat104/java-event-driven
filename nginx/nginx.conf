# Load balancer in front of the 5 order + 5 inventory instances.
#   POST/GET /api/orders      → order_backend     (5 instances)
#   GET      /api/inventory   → inventory_backend (5 instances)
# Round-robin with upstream keepalive so we reuse backend connections at 10k req/s
# instead of churning a TCP connection per request (which would exhaust ports).

worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 16384;
}

http {
    access_log off;          # keep the LB out of the hot path during load tests
    error_log  /var/log/nginx/error.log warn;

    upstream order_backend {
        least_conn;
        server order-1:8080 max_fails=3 fail_timeout=5s;
        server order-2:8080 max_fails=3 fail_timeout=5s;
        server order-3:8080 max_fails=3 fail_timeout=5s;
        server order-4:8080 max_fails=3 fail_timeout=5s;
        server order-5:8080 max_fails=3 fail_timeout=5s;
        keepalive 128;
    }

    upstream inventory_backend {
        least_conn;
        server inventory-1:8080 max_fails=3 fail_timeout=5s;
        server inventory-2:8080 max_fails=3 fail_timeout=5s;
        server inventory-3:8080 max_fails=3 fail_timeout=5s;
        server inventory-4:8080 max_fails=3 fail_timeout=5s;
        server inventory-5:8080 max_fails=3 fail_timeout=5s;
        keepalive 64;
    }

    server {
        listen 80;

        # If an instance is down, retry the next one (fault tolerance).
        proxy_next_upstream error timeout http_502 http_503 http_504;
        proxy_connect_timeout 2s;

        location /api/orders {
            proxy_pass http://order_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        location /api/inventory {
            proxy_pass http://inventory_backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host $host;
        }

        location /healthz {
            return 200 'ok';
            add_header Content-Type text/plain;
        }
    }
}
